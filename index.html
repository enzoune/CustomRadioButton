<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Button Customizado</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="card">
        <div class="title">Escoha seu Curso</div>
        <div class="content">
            <input type="radio" name="box" id="one">
            <input type="radio" name="box" id="two">
            <input type="radio" name="box" id="three">
            <label for="one" class="box first">
                <div class="course">
                    <span class="circle"></span>
                    <span class="subject">HTML & CSS</span>
                </div>
                <span class="price">R$500/ano</span>
            </label>
            <label for="two" class="box second">
                <div class="course">
                    <span class="circle"></span>
                    <span class="subject">JavaScript</span>
                </div>
                <span class="price">R$600/ano</span>
            </label>
            <label for="three" class="box third">
                <div class="course">
                    <span class="circle"></span>
                    <span class="subject">PHP & MySQL</span>
                </div>
                <span class="price">R$780/ano</span>
            </label>
        </div>
    </div>
</body>
</html>
